<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGINA ONE</title>
    <link rel="stylesheet" href="../css/cssp1.css">
    <script src="../js/jsp1.js"></script>
</head>
<body>
    <header><h2>EL NUMERO MAYOR ENTRE TODOS</h2></header>
   <div><h1>Inserte tres numeros que usted desee</h1></div>
    <table>
      <thead><td></td><td></td></thead>
        <tbody>
            <tr><td>Número 1</td><td><input type="text" id="num1"></td></tr>
            <tr><td>Número 2</td><td><input type="text" id="num2"></td></tr>
            <tr><td>Número 3</td><td><input type="text" id="num3"></td></tr>
        </tbody>  
    </table>
    <div>
        <p>Pulse el boton para agregar los numeros</p>
        <button id="botonadd" class="omg" onclick="agregado()">Agregar</button>
    </div>
    <div>
        <p>Pulse el boton para obtener el mayor de todos los numeros</p>
    <button id="botonmayor" class="omg" onclick="mayorizado()">Mayor</button>
    </div>
</body>
</html>
